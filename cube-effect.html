<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正方体空间特效</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body>
    <script>
        // 使用p5.js实例模式
        new p5(function(p) {
            let cubes = [];
            let particles = [];
            let waves = [];
            let rotationSpeed = 0.01;
            let rotationState = 0;
            let rotationAxis = 'x';
            let rotationLayer = 1;
            let blurAmount = 0;
            
            // 鼠标互动变量
            let mousePressed = false;
            let lastMouseX = 0;
            let lastMouseY = 0;
            let cubeRotationX = 0;
            let cubeRotationY = 0;
            
            p.setup = function() {
                p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
                p.colorMode(p.HSB, 360, 100, 100, 1);
                
                // 初始化正方体阵列
                for (let x = -1; x <= 1; x++) {
                    for (let y = -1; y <= 1; y++) {
                        for (let z = -1; z <= 1; z++) {
                            cubes.push(new Cube(p, x, y, z));
                        }
                    }
                }
                
                // 初始化粒子
                for (let i = 0; i < 100; i++) {
                    particles.push(new Particle(p));
                }
                
                // 初始化波纹
                for (let i = 0; i < 5; i++) {
                    waves.push(new Wave(p));
                }
            };
            
            p.draw = function() {
                p.background(0);
                
                // 动态模糊效果
                if (blurAmount > 0) {
                    p.filter(p.BLUR, blurAmount);
                    blurAmount = p.max(0, blurAmount - 0.05);
                }
                
                // 应用鼠标控制的旋转
                p.rotateX(cubeRotationX);
                p.rotateY(cubeRotationY);
                
                // 控制旋转
                if (rotationState > 0) {
                    rotateCubes();
                    rotationState -= 0.01;
                    if (rotationState <= 0) {
                        rotationState = 0;
                        // 随机选择下一次旋转
                        setTimeout(() => {
                            startRotation();
                        }, 1000);
                    }
                }
                
                // 绘制波纹
                waves.forEach(wave => {
                    wave.update();
                    wave.draw();
                });
                
                // 绘制粒子
                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
                
                // 绘制正方体阵列
                cubes.forEach(cube => {
                    cube.draw();
                });
            };
            
            // 开始旋转
            function startRotation() {
                rotationAxis = p.random(['x', 'y', 'z']);
                rotationLayer = p.floor(p.random(3));
                rotationState = p.PI / 2;
                blurAmount = 2;
            }
            
            // 旋转正方体
            function rotateCubes() {
                cubes.forEach(cube => {
                    if (rotationAxis === 'x' && cube.x === rotationLayer - 1) {
                        cube.rotateY(rotationSpeed);
                    } else if (rotationAxis === 'y' && cube.y === rotationLayer - 1) {
                        cube.rotateX(rotationSpeed);
                    } else if (rotationAxis === 'z' && cube.z === rotationLayer - 1) {
                        cube.rotateY(rotationSpeed);
                    }
                });
            }
            
            p.windowResized = function() {
                p.resizeCanvas(window.innerWidth, window.innerHeight);
            };
            
            // 鼠标按下事件
            p.mousePressed = function() {
                mousePressed = true;
                lastMouseX = p.mouseX;
                lastMouseY = p.mouseY;
            };
            
            // 鼠标释放事件
            p.mouseReleased = function() {
                mousePressed = false;
            };
            
            // 鼠标移动事件
            p.mouseMoved = function() {
                if (mousePressed) {
                    let deltaX = p.mouseX - lastMouseX;
                    let deltaY = p.mouseY - lastMouseY;
                    
                    // 根据鼠标移动旋转立方体
                    cubeRotationY += deltaX * 0.01;
                    cubeRotationX += deltaY * 0.01;
                    
                    lastMouseX = p.mouseX;
                    lastMouseY = p.mouseY;
                }
            };
            
            // 初始化旋转
            setTimeout(startRotation, 2000);
            
            // 正方体类
            class Cube {
                constructor(p, x, y, z) {
                    this.p = p;
                    this.x = x;
                    this.y = y;
                    this.z = z;
                    this.baseSize = 80;
                    this.size = this.baseSize * this.p.random(0.7, 1.3); // 不规则大小
                    this.rotationX = 0;
                    this.rotationY = 0;
                    this.rotationZ = 0;
                    this.vx = this.p.random(-0.01, 0.01); // 不规则运动速度
                    this.vy = this.p.random(-0.01, 0.01);
                    this.vz = this.p.random(-0.01, 0.01);
                    this.cracks = this.generateCracks();
                }
                
                generateCracks() {
                    let cracks = [];
                    for (let i = 0; i < 3; i++) {
                        cracks.push({
                            start: { x: this.p.random(), y: this.p.random() },
                            end: { x: this.p.random(), y: this.p.random() }
                        });
                    }
                    return cracks;
                }
                
                update() {
                    // 不规则运动
                    this.rotationX += this.vx;
                    this.rotationY += this.vy;
                    this.rotationZ += this.vz;
                }
                
                rotateX(angle) {
                    this.rotationX += angle;
                }
                
                rotateY(angle) {
                    this.rotationY += angle;
                }
                
                rotateZ(angle) {
                    this.rotationZ += angle;
                }
                
                draw() {
                    this.update(); // 更新不规则运动
                    
                    this.p.push();
                    
                    // 定位正方体
                    this.p.translate(this.x * this.baseSize * 1.2, this.y * this.baseSize * 1.2, this.z * this.baseSize * 1.2);
                    
                    // 应用旋转
                    this.p.rotateX(this.rotationX);
                    this.p.rotateY(this.rotationY);
                    this.p.rotateZ(this.rotationZ);
                    
                    // 绘制正方体
                    this.p.noFill();
                    this.p.stroke(180, 80, 80, 0.8);
                    this.p.strokeWeight(1);
                    this.p.box(this.size);
                    
                    // 绘制裂痕
                    this.drawCracks();
                    
                    this.p.pop();
                }
                
                drawCracks() {
                    this.p.stroke(0, 0, 100, 0.6);
                    this.p.strokeWeight(1);
                    
                    // 绘制前面的裂痕
                    this.p.push();
                    this.p.translate(0, 0, this.size / 2);
                    this.cracks.forEach(crack => {
                        this.p.line(
                            (crack.start.x - 0.5) * this.size,
                            (crack.start.y - 0.5) * this.size,
                            (crack.end.x - 0.5) * this.size,
                            (crack.end.y - 0.5) * this.size
                        );
                    });
                    this.p.pop();
                    
                    // 绘制后面的裂痕
                    this.p.push();
                    this.p.translate(0, 0, -this.size / 2);
                    this.p.rotateY(this.p.PI);
                    this.cracks.forEach(crack => {
                        this.p.line(
                            (crack.start.x - 0.5) * this.size,
                            (crack.start.y - 0.5) * this.size,
                            (crack.end.x - 0.5) * this.size,
                            (crack.end.y - 0.5) * this.size
                        );
                    });
                    this.p.pop();
                    
                    // 绘制左侧的裂痕
                    this.p.push();
                    this.p.translate(-this.size / 2, 0, 0);
                    this.p.rotateY(this.p.PI / 2);
                    this.cracks.forEach(crack => {
                        this.p.line(
                            (crack.start.x - 0.5) * this.size,
                            (crack.start.y - 0.5) * this.size,
                            (crack.end.x - 0.5) * this.size,
                            (crack.end.y - 0.5) * this.size
                        );
                    });
                    this.p.pop();
                    
                    // 绘制右侧的裂痕
                    this.p.push();
                    this.p.translate(this.size / 2, 0, 0);
                    this.p.rotateY(-this.p.PI / 2);
                    this.cracks.forEach(crack => {
                        this.p.line(
                            (crack.start.x - 0.5) * this.size,
                            (crack.start.y - 0.5) * this.size,
                            (crack.end.x - 0.5) * this.size,
                            (crack.end.y - 0.5) * this.size
                        );
                    });
                    this.p.pop();
                }
            }
            
            // 粒子类
            class Particle {
                constructor(p) {
                    this.p = p;
                    this.x = this.p.random(-300, 300);
                    this.y = this.p.random(-300, 300);
                    this.z = this.p.random(-300, 300);
                    this.vx = this.p.random(-0.5, 0.5);
                    this.vy = this.p.random(-0.5, 0.5);
                    this.vz = this.p.random(-0.5, 0.5);
                    this.size = this.p.random(1, 3);
                    this.opacity = this.p.random(0.2, 0.6);
                }
                
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.z += this.vz;
                    
                    // 边界检查
                    if (this.x > 300) this.x = -300;
                    if (this.x < -300) this.x = 300;
                    if (this.y > 300) this.y = -300;
                    if (this.y < -300) this.y = 300;
                    if (this.z > 300) this.z = -300;
                    if (this.z < -300) this.z = 300;
                }
                
                draw() {
                    this.p.push();
                    this.p.translate(this.x, this.y, this.z);
                    this.p.noStroke();
                    this.p.fill(180, 80, 80, this.opacity);
                    this.p.sphere(this.size);
                    this.p.pop();
                }
            }
            
            // 波纹类
            class Wave {
                constructor(p) {
                    this.p = p;
                    this.x = this.p.random(-200, 200);
                    this.y = this.p.random(-200, 200);
                    this.z = this.p.random(-200, 200);
                    this.radius = 0;
                    this.maxRadius = this.p.random(100, 200);
                    this.speed = this.p.random(1, 3);
                    this.opacity = 1;
                }
                
                update() {
                    this.radius += this.speed;
                    this.opacity = 1 - (this.radius / this.maxRadius);
                    
                    if (this.radius > this.maxRadius) {
                        this.radius = 0;
                        this.opacity = 1;
                        this.x = this.p.random(-200, 200);
                        this.y = this.p.random(-200, 200);
                        this.z = this.p.random(-200, 200);
                    }
                }
                
                draw() {
                    this.p.push();
                    this.p.translate(this.x, this.y, this.z);
                    this.p.noFill();
                    this.p.stroke(220, 80, 30, this.opacity * 0.5);
                    this.p.strokeWeight(2);
                    this.p.sphere(this.radius, 32, 32);
                    this.p.pop();
                }
            }
        });
    </script>
</body>
</html>
