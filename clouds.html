<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天空云朵特效</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <script>
        // 使用p5.js实例模式
        new p5(function(p) {
            let clouds = [];
            let lightRays = [];
            
            p.setup = function() {
                p.createCanvas(window.innerWidth, window.innerHeight);
                
                // 初始化云朵
                for (let i = 0; i < 10; i++) {
                    clouds.push(new Cloud(p));
                }
                
                // 初始化光线
                for (let i = 0; i < 5; i++) {
                    lightRays.push(new LightRay(p));
                }
            };
            
            p.draw = function() {
                // 绘制天空背景（从深蓝到浅蓝渐变）
                let skyGradient = p.drawingContext.createLinearGradient(0, 0, 0, p.height);
                skyGradient.addColorStop(0, '#1a73e8');
                skyGradient.addColorStop(1, '#81cfe0');
                p.background(skyGradient);
                
                // 绘制光线散射效果
                lightRays.forEach(ray => {
                    ray.update();
                    ray.draw();
                });
                
                // 绘制云朵
                clouds.forEach(cloud => {
                    cloud.update();
                    cloud.draw();
                });
            };
            
            p.windowResized = function() {
                p.resizeCanvas(window.innerWidth, window.innerHeight);
            };
            
            // 云朵类
            class Cloud {
                constructor(p) {
                    this.p = p;
                    this.x = p.random(p.width);
                    this.y = p.random(p.height * 0.3);
                    this.size = p.random(100, 300);
                    this.speed = p.random(0.1, 0.5);
                    this.opacity = p.random(0.6, 0.9);
                }
                
                update() {
                    this.x += this.speed;
                    if (this.x > this.p.width + this.size) {
                        this.x = -this.size;
                        this.y = this.p.random(this.p.height * 0.3);
                    }
                }
                
                draw() {
                    this.p.noStroke();
                    this.p.fill(255, 255, 255, this.opacity * 255);
                    
                    // 绘制层积云效果，多个椭圆组合
                    let parts = this.p.floor(this.p.random(3, 6));
                    for (let i = 0; i < parts; i++) {
                        let offsetX = (i - parts/2) * this.size * 0.3;
                        let offsetY = this.p.random(-this.size * 0.1, this.size * 0.1);
                        let partSize = this.size * this.p.random(0.6, 1.2);
                        this.p.ellipse(this.x + offsetX, this.y + offsetY, partSize, partSize * 0.6);
                    }
                }
            }
            
            // 光线类（丁达尔效应）
            class LightRay {
                constructor(p) {
                    this.p = p;
                    this.x = p.random(p.width);
                    this.y = -50;
                    this.length = p.random(p.height * 0.5, p.height * 0.8);
                    this.angle = p.random(-p.PI/6, p.PI/6);
                    this.opacity = p.random(0.1, 0.3);
                    this.speed = p.random(0.2, 0.5);
                }
                
                update() {
                    this.x += this.speed;
                    if (this.x > this.p.width) {
                        this.x = -100;
                        this.y = -50;
                        this.angle = this.p.random(-this.p.PI/6, this.p.PI/6);
                    }
                }
                
                draw() {
                    this.p.push();
                    this.p.translate(this.x, this.y);
                    this.p.rotate(this.angle);
                    
                    // 绘制光线散射效果
                    for (let i = 0; i < 10; i++) {
                        let rayWidth = this.p.random(50, 150);
                        let rayLength = this.length * this.p.random(0.8, 1.2);
                        let rayOpacity = this.opacity * this.p.random(0.5, 1);
                        
                        this.p.noStroke();
                        this.p.fill(255, 255, 255, rayOpacity * 255);
                        this.p.rect(-rayWidth/2, 0, rayWidth, rayLength);
                    }
                    
                    this.p.pop();
                }
            }
        });
    </script>
</body>
</html>
