<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 伙伴</title>
<style>
:root {
  --bg-start: #f0f4ff;
  --bg-end: #e8e0f0;
  --user-bubble: #c4b5fd;
  --user-bubble-dark: #a78bfa;
  --ai-bubble: #ffffff;
  --ai-text: #374151;
  --user-text: #ffffff;
  --accent: #8b5cf6;
  --accent-hover: #7c3aed;
  --accent-light: #ede9fe;
  --text-primary: #1f2937;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: rgba(139, 92, 246, 0.15);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-bubble: 0 2px 12px rgba(0, 0, 0, 0.06);
  --radius: 16px;
  --radius-sm: 12px;
  --max-width: 600px;
  --header-h: 56px;
  --input-h: 72px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

.chat-container {
  max-width: var(--max-width);
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
}

@media (min-width: 601px) {
  .chat-container {
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(139, 92, 246, 0.08);
  }
}

/* ===== Header ===== */
.chat-header {
  height: var(--header-h);
  min-height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(139, 92, 246, 0.1);
  z-index: 10;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #c084fc);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  flex-shrink: 0;
  animation: avatarPulse 3s ease-in-out infinite;
}

@keyframes avatarPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.3); }
  50% { box-shadow: 0 0 0 6px rgba(139, 92, 246, 0); }
}

.header-info h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  animation: fadeSlideDown 0.6s ease-out;
}

.header-info .status {
  font-size: 12px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 4px;
  animation: fadeSlideDown 0.6s ease-out 0.1s both;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #34d399;
  display: inline-block;
  animation: statusBlink 2s ease-in-out infinite;
}

@keyframes statusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-header {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: 1px solid rgba(139, 92, 246, 0.15);
  background: rgba(255, 255, 255, 0.6);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: all 0.2s ease;
  position: relative;
}

.btn-header:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: scale(1.08);
}

.btn-header:active {
  transform: scale(0.95);
}

/* ===== Error Toast ===== */
.error-toast {
  position: absolute;
  top: calc(var(--header-h) + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #dc2626;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: calc(100% - 32px);
  text-align: center;
  box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);
}

.error-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

/* ===== Chat Messages ===== */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-messages::-webkit-scrollbar {
  width: 4px;
}

.chat-messages::-webkit-scrollbar-track {
  background: transparent;
}

.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(139, 92, 246, 0.2);
  border-radius: 4px;
}

.message-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  animation: messageSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes messageSlideIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message-row.user {
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

.message-row.ai .msg-avatar {
  background: linear-gradient(135deg, var(--accent), #c084fc);
  color: #fff;
}

.message-row.user .msg-avatar {
  background: linear-gradient(135deg, #f472b6, #fb923c);
  color: #fff;
}

.bubble {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
  position: relative;
}

.message-row.user .bubble {
  background: linear-gradient(135deg, var(--user-bubble), var(--user-bubble-dark));
  color: var(--user-text);
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 12px rgba(167, 139, 250, 0.25);
}

.message-row.ai .bubble {
  background: var(--ai-bubble);
  color: var(--ai-text);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow-bubble);
}

.bubble::after {
  content: '';
  position: absolute;
  bottom: 0;
  width: 0;
  height: 0;
}

.message-row.user .bubble::after {
  right: -6px;
  border-left: 8px solid var(--user-bubble-dark);
  border-bottom: 8px solid transparent;
}

.message-row.ai .bubble::after {
  left: -6px;
  border-right: 8px solid #ffffff;
  border-bottom: 8px solid transparent;
}

.bubble .time {
  font-size: 11px;
  opacity: 0.55;
  margin-top: 4px;
  display: block;
  text-align: right;
}

/* ===== Markdown Styles in Bubble ===== */
.bubble strong {
  font-weight: 700;
}

.bubble em {
  font-style: italic;
}

.bubble code {
  background: rgba(139, 92, 246, 0.08);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
}

.message-row.user .bubble code {
  background: rgba(255, 255, 255, 0.2);
}

.bubble pre {
  background: #1e1e2e;
  color: #cdd6f4;
  padding: 10px 12px;
  border-radius: 8px;
  margin: 6px 0;
  overflow-x: auto;
  font-size: 12.5px;
  line-height: 1.5;
}

.bubble pre code {
  background: none;
  padding: 0;
  color: inherit;
}

.bubble br {
  display: block;
}

/* ===== Typing Indicator ===== */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-indicator span:nth-child(1) { animation-delay: 0s; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% {
    transform: translateY(0);
    opacity: 0.4;
  }
  30% {
    transform: translateY(-8px);
    opacity: 1;
  }
}

/* ===== Welcome Message ===== */
.welcome {
  text-align: center;
  padding: 40px 20px 20px;
  animation: fadeSlideDown 0.8s ease-out;
}

.welcome .welcome-icon {
  font-size: 48px;
  margin-bottom: 12px;
  animation: welcomeFloat 3s ease-in-out infinite;
}

@keyframes welcomeFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.welcome h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.welcome p {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 280px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ===== Input Area ===== */
.chat-input-area {
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid rgba(139, 92, 246, 0.08);
  z-index: 10;
}

.input-wrapper {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: rgba(255, 255, 255, 0.8);
  border: 1.5px solid rgba(139, 92, 246, 0.15);
  border-radius: 22px;
  padding: 6px 6px 6px 16px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
}

.input-wrapper textarea {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  resize: none;
  max-height: 100px;
  min-height: 24px;
  padding: 6px 0;
  font-family: inherit;
}

.input-wrapper textarea::placeholder {
  color: var(--text-muted);
}

.char-counter {
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
  padding: 2px 4px 0;
  transition: color 0.2s ease;
  white-space: nowrap;
}

.char-counter.warn {
  color: #f59e0b;
}

.char-counter.limit {
  color: #ef4444;
  font-weight: 600;
}

.btn-send {
  width: 38px;
  height: 38px;
  min-width: 38px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.btn-send:hover:not(:disabled) {
  transform: scale(1.1);
  background: linear-gradient(135deg, var(--accent-hover), #8b5cf6);
  box-shadow: 0 4px 16px rgba(139, 92, 246, 0.35);
}

.btn-send:active:not(:disabled) {
  transform: scale(0.92);
}

.btn-send:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}

/* ===== Confirm Dialog ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.dialog {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  max-width: 300px;
  width: calc(100% - 48px);
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  transform: scale(0.9);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.overlay.show .dialog {
  transform: scale(1);
}

.dialog h3 {
  font-size: 16px;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.dialog p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}

.dialog-actions {
  display: flex;
  gap: 10px;
}

.dialog-actions button {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-cancel {
  background: #f3f4f6;
  color: var(--text-secondary);
}

.btn-cancel:hover {
  background: #e5e7eb;
}

.btn-confirm {
  background: linear-gradient(135deg, #ef4444, #f87171);
  color: #fff;
}

.btn-confirm:hover {
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
  transform: translateY(-1px);
}

/* ===== Responsive ===== */
@media (max-width: 400px) {
  .bubble {
    max-width: 82%;
    font-size: 13.5px;
  }
  .welcome h2 {
    font-size: 18px;
  }
}
</style>
</head>
<body>

<div class="chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">✦</div>
      <div class="header-info">
        <h1>AI 伙伴</h1>
        <div class="status"><span class="status-dot"></span>在线</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-header" id="btnClear" title="清空聊天记录">🗑</button>
    </div>
  </div>

  <!-- Error Toast -->
  <div class="error-toast" id="errorToast"></div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">💬</div>
      <h2>你好，我是 AI 伙伴</h2>
      <p>随时为你答疑解惑，开始聊天吧！</p>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="input-wrapper">
      <textarea id="msgInput" rows="1" placeholder="输入你想说的话..." maxlength="500"></textarea>
      <span class="char-counter" id="charCounter">0/500</span>
      <button class="btn-send" id="btnSend" disabled title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <h3>清空聊天记录</h3>
    <p>确定要清空所有聊天记录吗？此操作无法撤销。</p>
    <div class="dialog-actions">
      <button class="btn-cancel" id="btnCancel">取消</button>
      <button class="btn-confirm" id="btnConfirmClear">确定清空</button>
    </div>
  </div>
</div>

<script>
(() => {
  const STORAGE_KEY = 'ai_chat_messages';
  const MAX_MESSAGES = 50;
  const MAX_CHARS = 500;
  const API_TIMEOUT = 15000;

  const API_URL = 'https://api.deepseek.com/chat/completions';
  const API_KEY = 'sk-d2e949edfa1d44598b27ce51632f4ab1';

  function buildMessages(userText) {
    const history = messages.slice(-10).map(m => ({
      role: m.role === 'ai' ? 'assistant' : 'user',
      content: m.content
    }));
    history.push({ role: 'user', content: userText });
    return history;
  }

  const chatMessages = document.getElementById('chatMessages');
  const msgInput = document.getElementById('msgInput');
  const btnSend = document.getElementById('btnSend');
  const charCounter = document.getElementById('charCounter');
  const btnClear = document.getElementById('btnClear');
  const overlay = document.getElementById('overlay');
  const btnCancel = document.getElementById('btnCancel');
  const btnConfirmClear = document.getElementById('btnConfirmClear');
  const errorToast = document.getElementById('errorToast');
  const welcomeScreen = document.getElementById('welcomeScreen');

  let messages = [];
  let isWaiting = false;

  function loadMessages() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        messages = JSON.parse(data);
        messages = messages.slice(-MAX_MESSAGES);
      }
    } catch {
      messages = [];
    }
  }

  function saveMessages() {
    try {
      const toSave = messages.slice(-MAX_MESSAGES);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    } catch {}
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function renderMarkdown(text) {
    let html = escapeHtml(text);

    html = html.replace(/```([\s\S]*?)```/g, (_, code) => {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });

    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/_(.+?)_/g, '<em>$1</em>');
    html = html.replace(/\n/g, '<br>');

    return html;
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return hh + ':' + mm;
  }

  function hideWelcome() {
    if (welcomeScreen) {
      welcomeScreen.style.display = 'none';
    }
  }

  function createMessageEl(msg) {
    const row = document.createElement('div');
    row.className = 'message-row ' + msg.role;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = msg.role === 'user' ? '我' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const content = document.createElement('div');
    content.className = 'bubble-content';
    content.innerHTML = renderMarkdown(msg.content);

    const time = document.createElement('span');
    time.className = 'time';
    time.textContent = formatTime(msg.timestamp);

    bubble.appendChild(content);
    bubble.appendChild(time);
    row.appendChild(avatar);
    row.appendChild(bubble);

    return row;
  }

  function renderMessages() {
    while (chatMessages.firstChild) {
      chatMessages.removeChild(chatMessages.firstChild);
    }

    if (messages.length === 0) {
      chatMessages.appendChild(welcomeScreen);
      if (welcomeScreen) welcomeScreen.style.display = '';
      return;
    }

    hideWelcome();
    messages.forEach(msg => {
      chatMessages.appendChild(createMessageEl(msg));
    });

    scrollToBottom(false);
  }

  function appendMessage(msg) {
    hideWelcome();
    const el = createMessageEl(msg);
    chatMessages.appendChild(el);
    scrollToBottom(true);
  }

  function scrollToBottom(smooth) {
    requestAnimationFrame(() => {
      chatMessages.scrollTo({
        top: chatMessages.scrollHeight,
        behavior: smooth ? 'smooth' : 'auto'
      });
    });
  }

  function showError(text) {
    errorToast.textContent = text;
    errorToast.classList.add('show');
    setTimeout(() => {
      errorToast.classList.remove('show');
    }, 3000);
  }

  function createTypingEl() {
    const row = document.createElement('div');
    row.className = 'message-row ai';
    row.id = 'typingRow';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const typing = document.createElement('div');
    typing.className = 'typing-indicator';
    typing.innerHTML = '<span></span><span></span><span></span>';

    bubble.appendChild(typing);
    row.appendChild(avatar);
    row.appendChild(bubble);

    return row;
  }

  function showTyping() {
    const el = createTypingEl();
    chatMessages.appendChild(el);
    scrollToBottom(true);
  }

  function hideTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  function updateSendBtn() {
    const val = msgInput.value.trim();
    btnSend.disabled = !val || isWaiting;
  }

  function updateCounter() {
    const len = msgInput.value.length;
    charCounter.textContent = len + '/500';
    charCounter.classList.remove('warn', 'limit');
    if (len >= MAX_CHARS) {
      charCounter.classList.add('limit');
    } else if (len >= MAX_CHARS * 0.8) {
      charCounter.classList.add('warn');
    }
  }

  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  }

  function addUserMessage(text) {
    const msg = {
      role: 'user',
      content: text,
      timestamp: Date.now()
    };
    messages.push(msg);
    saveMessages();
    appendMessage(msg);
  }

  function addAiMessage(text) {
    const msg = {
      role: 'ai',
      content: text,
      timestamp: Date.now()
    };
    messages.push(msg);
    saveMessages();
    appendMessage(msg);
  }

  async function sendToApi(text) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), API_TIMEOUT);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: [
            { role: 'system', content: '你是一个友好、有帮助的AI助手，用中文回答问题。' },
            ...buildMessages(text)
          ],
          temperature: 0.7,
          max_tokens: 2000
        }),
        signal: controller.signal
      });

      clearTimeout(timer);

      if (!res.ok) {
        const errData = await res.json().catch(() => null);
        const errMsg = errData?.error?.message || res.statusText;
        throw new Error('服务器响应异常 (' + res.status + '): ' + errMsg);
      }

      const data = await res.json();

      if (data.choices && data.choices[0] && data.choices[0].message) {
        return data.choices[0].message.content;
      }

      throw new Error('响应格式异常');
    } catch (err) {
      clearTimeout(timer);
      if (err.name === 'AbortError') {
        throw new Error('回复超时，请重试');
      }
      if (err.message.includes('服务器响应异常') || err.message.includes('响应格式异常')) {
        throw err;
      }
      throw new Error('网络连接失败，请检查网络后重试');
    }
  }

  async function handleSend() {
    const text = msgInput.value.trim();
    if (!text || isWaiting) return;

    addUserMessage(text);

    msgInput.value = '';
    autoResize();
    updateCounter();
    updateSendBtn();

    isWaiting = true;
    updateSendBtn();
    showTyping();

    try {
      const reply = await sendToApi(text);
      hideTyping();
      addAiMessage(reply);
    } catch (err) {
      hideTyping();
      showError(err.message);
      addAiMessage('⚠️ ' + err.message);
    } finally {
      isWaiting = false;
      updateSendBtn();
    }
  }

  function showConfirmDialog() {
    overlay.classList.add('show');
  }

  function hideConfirmDialog() {
    overlay.classList.remove('show');
  }

  function clearChat() {
    messages = [];
    saveMessages();
    renderMessages();
    hideConfirmDialog();
  }

  msgInput.addEventListener('input', () => {
    if (msgInput.value.length > MAX_CHARS) {
      msgInput.value = msgInput.value.slice(0, MAX_CHARS);
    }
    autoResize();
    updateCounter();
    updateSendBtn();
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  btnSend.addEventListener('click', handleSend);
  btnClear.addEventListener('click', showConfirmDialog);
  btnCancel.addEventListener('click', hideConfirmDialog);
  btnConfirmClear.addEventListener('click', clearChat);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) hideConfirmDialog();
  });

  loadMessages();
  renderMessages();

  if (messages.length > 0) {
    scrollToBottom(false);
  }
})();
</script>
</body>
</html>
