<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水墨风特效</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #f5f5f5;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = `rgba(0, 0, 0, ${this.opacity})`;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0 || this.x > canvas.width) {
                    this.vx *= -1;
                }
                if (this.y < 0 || this.y > canvas.height) {
                    this.vy *= -1;
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }
        
        // 水滴类
        class WaterDrop {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.vy = Math.random() * 5 + 5;
                this.size = Math.random() * 5 + 3;
                this.opacity = 0.8;
                this.splash = false;
                this.ripples = [];
            }
            
            update() {
                if (!this.splash) {
                    this.y += this.vy;
                    this.vy += 0.2;
                    
                    if (this.y > canvas.height - this.size) {
                        this.splash = true;
                        this.createRipples();
                    }
                } else {
                    this.ripples.forEach(ripple => ripple.update());
                    this.ripples = this.ripples.filter(ripple => ripple.radius < canvas.width);
                }
            }
            
            createRipples() {
                for (let i = 0; i < 3; i++) {
                    this.ripples.push(new Ripple(this.x, canvas.height, i * 10));
                }
            }
            
            draw() {
                if (!this.splash) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 0, 0, ${this.opacity})`;
                    ctx.fill();
                }
                
                this.ripples.forEach(ripple => ripple.draw());
            }
        }
        
        // 水纹类
        class Ripple {
            constructor(x, y, delay) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.speed = 2;
                this.opacity = 0.5;
                this.delay = delay;
                this.active = false;
                this.timer = setTimeout(() => {
                    this.active = true;
                }, delay);
            }
            
            update() {
                if (this.active) {
                    this.radius += this.speed;
                    this.opacity -= 0.01;
                }
            }
            
            draw() {
                if (this.active) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 0, 0, ${this.opacity})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
        
        // 书法特效类
        class Calligraphy {
            constructor() {
                this.points = [];
                this.maxPoints = 50;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0 || this.x > canvas.width) {
                    this.vx *= -1;
                }
                if (this.y < 0 || this.y > canvas.height) {
                    this.vy *= -1;
                }
                
                this.points.push({ x: this.x, y: this.y });
                if (this.points.length > this.maxPoints) {
                    this.points.shift();
                }
            }
            
            draw() {
                if (this.points.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 1; i < this.points.length; i++) {
                    const midX = (this.points[i-1].x + this.points[i].x) / 2;
                    const midY = (this.points[i-1].y + this.points[i].y) / 2;
                    ctx.quadraticCurveTo(this.points[i-1].x, this.points[i-1].y, midX, midY);
                }
                
                const opacity = Math.sin(Date.now() * 0.001) * 0.3 + 0.2;
                ctx.strokeStyle = `rgba(0, 0, 0, ${opacity})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 初始化对象
        const particles = [];
        const waterDrops = [];
        const calligraphies = [];
        
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }
        
        for (let i = 0; i < 5; i++) {
            calligraphies.push(new Calligraphy());
        }
        
        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 绘制水滴和水纹
            if (Math.random() < 0.02) {
                waterDrops.push(new WaterDrop());
            }
            
            waterDrops.forEach((drop, index) => {
                drop.update();
                drop.draw();
                
                if (drop.splash && drop.ripples.length === 0) {
                    waterDrops.splice(index, 1);
                }
            });
            
            // 绘制书法特效
            calligraphies.forEach(calligraphy => {
                calligraphy.update();
                calligraphy.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
